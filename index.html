<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>板橋案｜賞屋預約名單</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', '微軟正黑體', sans-serif;
      background: #f0f0f0;
      color: #1a1a1a;
      font-size: 16px;
    }

    header {
      background: #1a1a1a;
      color: #fff;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.08em; }
    #meta { font-size: 13px; color: #aaa; text-align: right; line-height: 1.8; }
    #meta span { color: #f0c060; }

    .toolbar {
      background: #fff;
      padding: 12px 20px;
      border-bottom: 2px solid #ddd;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .toolbar input {
      font-size: 17px;
      padding: 9px 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      flex: 1;
      min-width: 180px;
    }
    #total-count { font-size: 15px; color: #555; white-space: nowrap; }

    #loading {
      text-align: center;
      padding: 80px;
      font-size: 20px;
      color: #888;
    }
    #error-msg {
      display: none;
      text-align: center;
      padding: 60px;
      font-size: 18px;
      color: #c00;
    }

    /* Cards */
    #cards {
      display: none;
      padding: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .card-header {
      background: #1a1a1a;
      color: #fff;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .card-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .card-date {
      font-size: 13px;
      color: #aaa;
    }
    .card-body {
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 20px;
    }
    .field { display: flex; flex-direction: column; gap: 2px; }
    .field-label {
      font-size: 12px;
      color: #999;
      letter-spacing: 0.05em;
    }
    .field-value {
      font-size: 18px;
      color: #111;
      font-weight: 500;
      line-height: 1.4;
    }
    .field-value.phone { color: #0055cc; }
    .field-value.budget { color: #b85c00; font-weight: 700; }
    .field-value.first-yes { color: #1a7a1a; font-weight: 700; }
    .field-value.empty { color: #ccc; font-weight: 400; font-size: 15px; }

    .card-footer {
      background: #fafafa;
      border-top: 1px solid #eee;
      padding: 10px 18px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 14px;
      background: #f0f0f0;
      border-radius: 20px;
      padding: 4px 14px;
      color: #444;
    }
    .badge.purpose { background: #e8f0ff; color: #1a3a8a; }
    .badge.project { background: #fff3e0; color: #7a3a00; }
  </style>
</head>
<body>

<header>
  <h1>板橋案｜賞屋預約名單</h1>
  <div id="meta">
    共 <span id="shown-count">—</span> 筆　最後更新：<span id="last-update">載入中…</span><br>
    <small>每 10 分鐘自動更新</small>
  </div>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="搜尋姓名 / 電話 / LINE…" oninput="filterCards()"/>
  <span id="total-count"></span>
</div>

<div id="loading">資料載入中…</div>
<div id="error-msg">⚠ 資料載入失敗，請確認 data.json 是否存在。</div>
<div id="cards"></div>

<script>
let allData = [];

function val(v, cls) {
  if (!v) return `<span class="field-value empty">—</span>`;
  return `<span class="field-value ${cls||''}">${v}</span>`;
}

function district(r) {
  if (r.taipei_district) return `台北市 ${r.taipei_district}`;
  if (r.newtaipei_district) return `新北市 ${r.newtaipei_district}`;
  return r.city || '';
}

function renderCard(r) {
  const isFirst = r.first_buyer === '是';
  const loc = district(r);
  return `
  <div class="card">
    <div class="card-header">
      <span class="card-name">${r.name || '—'}</span>
      <span class="card-date">${r.date ? r.date.slice(0,16) : ''}</span>
    </div>
    <div class="card-body">
      <div class="field">
        <span class="field-label">電話</span>
        ${val(r.phone, 'phone')}
      </div>
      <div class="field">
        <span class="field-label">LINE ID</span>
        ${val(r.line_id)}
      </div>
      <div class="field">
        <span class="field-label">年齡</span>
        ${val(r.age)}
      </div>
      <div class="field">
        <span class="field-label">居住地區</span>
        ${val(loc)}
      </div>
      <div class="field">
        <span class="field-label">職業</span>
        ${val(r.occupation)}
      </div>
      <div class="field">
        <span class="field-label">購屋預算</span>
        ${val(r.budget, 'budget')}
      </div>
      <div class="field">
        <span class="field-label">首購</span>
        <span class="field-value ${isFirst ? 'first-yes' : ''}">${r.first_buyer || '—'}</span>
      </div>
      <div class="field">
        <span class="field-label">想看房型</span>
        ${val(r.housing_type)}
      </div>
    </div>
    <div class="card-footer">
      <span class="badge project">🏠 ${r.project || '—'}</span>
      <span class="badge purpose">${r.purpose || '—'}</span>
    </div>
  </div>`;
}

function filterCards() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const rows = q
    ? allData.filter(r =>
        (r.name || '').toLowerCase().includes(q) ||
        (r.phone || '').includes(q) ||
        (r.line_id || '').toLowerCase().includes(q) ||
        (r.city || '').includes(q) ||
        (r.project || '').includes(q)
      )
    : allData;
  document.getElementById('cards').innerHTML = rows.map(renderCard).join('');
  document.getElementById('shown-count').textContent = rows.length;
  document.getElementById('total-count').textContent = `顯示 ${rows.length} / ${allData.length} 筆`;
}

async function loadData() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) throw new Error('fetch failed');
    const json = await res.json();
    allData = json.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    document.getElementById('loading').style.display = 'none';
    document.getElementById('cards').style.display = '';
    document.getElementById('last-update').textContent = new Date().toLocaleString('zh-TW');
    filterCards();
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = '';
  }
}

loadData();
setInterval(loadData, 10 * 60 * 1000);
</script>
</body>
</html>
